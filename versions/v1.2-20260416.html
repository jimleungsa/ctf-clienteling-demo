<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CTF Clienteling Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --ctf-red: #C8102E;
            --ctf-red-dark: #8B0000;
            --ctf-gold: #C9A962;
            --ctf-gold-light: #E8D5A3;
            --ctf-gold-dark: #8B7355;
        }
        
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang HK", "SF Pro", sans-serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .device-frame {
            width: 100%;
            height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
        }
        
        @media (min-width: 431px) {
            .device-frame {
                height: 90vh;
                margin-top: 5vh;
                border-radius: 44px;
                box-shadow: 0 0 0 14px #1a1a1a, 0 50px 100px rgba(0,0,0,0.6);
            }
        }
        
        .screen {
            width: 100%;
            height: 100%;
            background: #F8F8F8;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
        }
        
        @media (max-width: 430px) {
            .screen { border-radius: 0; }
        }
        
        /* Notch */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 126px;
            height: 34px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 1000;
        }
        
        /* Status Bar */
        .status-bar {
            height: 47px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .time { font-size: 15px; font-weight: 600; }
        .status-icons { display: flex; gap: 5px; font-size: 14px; }
        
        /* Content */
        .content {
            height: 100%;
            padding-top: 47px;
            padding-bottom: 83px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .page { display: none; }
        .page.active { display: block; }
        
        /* Header Gradient */
        .header-gradient {
            background: linear-gradient(135deg, #C8102E 0%, #8B0000 60%, #5C0011 100%);
            padding: 12px 20px 24px;
            border-radius: 0 0 24px 24px;
            position: relative;
            overflow: hidden;
        }
        
        .header-gradient::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(201,169,98,0.3) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }
        
        .greeting { color: rgba(255,255,255,0.8); font-size: 13px; margin-bottom: 4px; }
        .user-name { color: #fff; font-size: 22px; font-weight: 700; }
        .user-store { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 2px; }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .lang-btn {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 6px 12px;
            font-size: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .notif-btn {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .notif-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 16px;
            height: 16px;
            background: #C9A962;
            border-radius: 50%;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
        }
        
        /* Search */
        .search-box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 1;
        }
        
        .search-box i { color: rgba(255,255,255,0.7); font-size: 16px; }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.5); }
        
        /* Currency Bar */
        .currency-section {
            padding: 16px 20px;
        }
        
        .currency-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .currency-bar {
            background: linear-gradient(135deg, #FFF9F0 0%, #FEF2F2 100%);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(201,169,98,0.2);
        }
        
        .currency-item { text-align: center; }
        .currency-flag { font-size: 24px; margin-bottom: 6px; }
        .currency-rate { 
            font-size: 15px; 
            font-weight: 700; 
            color: #C8102E;
            font-family: 'SF Mono', monospace;
        }
        .currency-label { font-size: 11px; color: #999; margin-top: 2px; }
        
        /* Quick Actions */
        .quick-section {
            padding: 0 20px 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        
        .section-title { 
            font-size: 17px; 
            font-weight: 700; 
            color: #1a1a1a;
        }
        
        .section-more { 
            font-size: 13px; 
            color: #C8102E;
            display: flex;
            align-items: center;
            gap: 4px;
        }

            display: grid;
