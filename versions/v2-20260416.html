<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CTF Clienteling - HK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --ctf-red: #C8102E;
            --ctf-red-dark: #A00D24;
            --ctf-red-light: #FCE8EB;
            --ctf-gold: #C9A962;
            --ctf-gold-dark: #B8984F;
            --ctf-gold-light: #F9F5ED;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --bg-tertiary: #F0F2F5;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border-color: #F0F0F0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12), 0 4px 8px rgba(0,0,0,0.04);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }
        
        body { 
            font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; 
            background: var(--bg-secondary); 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .font-number {
            font-family: "Roboto Mono", "SF Mono", "DIN", monospace;
            font-feature-settings: "tnum";
            letter-spacing: -0.02em;
        }
        
        .app-wrapper {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            background: var(--bg-primary);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.15);
        }
        
        /* Status Bar */
        .status-bar {
            height: 44px;
            background: linear-gradient(135deg, var(--ctf-red) 0%, var(--ctf-red-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            position: relative;
            z-index: 100;
        }
        
        .status-bar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
        
        .status-bar .time {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .status-bar .icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        .status-bar .icons i {
            font-size: 14px;
        }
        
        /* App Content */
        .app-content {
            height: calc(100vh - 44px - 70px);
            overflow-y: auto;
            background: var(--bg-secondary);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .app-content::-webkit-scrollbar {
            display: none;
        }
        
        .page {
            display: none;
            min-height: 100%;
            padding: 16px;
            animation: fadeIn 0.3s ease-out;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 4px 0;
        }
        
        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
        }
        
        .back-btn:hover {
            transform: translateX(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .back-btn:active {
            transform: scale(0.95);
        }
        
        /* Cards */
        .card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }
        
        .card:hover {
            box-shadow: var(--shadow-md);
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title i {
            color: var(--ctf-red);
            font-size: 18px;
        }
        
        /* Dashboard - Premium Design */
        .dashboard-section {
            background: linear-gradient(145deg, var(--ctf-red) 0%, var(--ctf-red-dark) 50%, #8B0A1E 100%);
            border-radius: var(--radius-xl);
            padding: 24px;
            margin: -16px -16px 20px -16px;
            position: relative;
            overflow: hidden;
        }
        
        .dashboard-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .dashboard-section::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(201,169,98,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .dashboard-title {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .dashboard-date {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .dashboard-amount {
            font-size: 36px;
            font-weight: 700
